<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Left circle -->
  <circle cx="50" cy="100" r="35" fill="url(#grad1)"/>
  
  <!-- Right circle -->
  <circle cx="150" cy="100" r="35" fill="url(#grad2)"/>
  
  <!-- Connecting line -->
  <line x1="85" y1="100" x2="115" y2="100" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Center connector -->
  <circle cx="100" cy="100" r="6" fill="#ffffff"/>
</svg>